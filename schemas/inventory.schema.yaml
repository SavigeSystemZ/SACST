$schema: "http://json-schema.org/draft-07/schema#"
title: "Inventory"
type: object
required:
  - schema_version
  - devices
properties:
  schema_version:
    type: integer
    const: 1
  devices:
    type: array
    items:
      type: object
      required:
        - name
        - platform_family
        - role
        - host
        - transport
        - auth_ref
        - validation_profile
        - risk_class
      properties:
        name:
          type: string
        platform_family:
          type: string
          enum: [linux-desktop, linux-server, windows-desktop, windows-server, opnsense, switch, router, firewall, wireless-controller, nas, storage, hypervisor, generic-vendor, other]
        role:
          type: string
        host:
          type: string
        transport:
          type: string
          enum: [local, ssh, https, console, api, other]
        auth_ref:
          type: string
        user:
          type: string
        port:
          type: integer
        bastion:
          type: string
        validation_profile:
          type: string
        backup_profile:
          type: string
        collector_profile:
          type: string
        backup_command:
          type: string
        rollback_capability:
          type: string
        risk_class:
          type: string
        validate_command:
          type: string
        management_probe:
          type: string
        management_interface:
          type: string
        network_zone:
          type: string
        maintenance_window:
          type: string
        command_timeout_seconds:
          type: integer
          minimum: 1
        recheck_count:
          type: integer
          minimum: 0
        recheck_interval_seconds:
          type: integer
          minimum: 0
        tags:
          type: array
          items:
            type: string
