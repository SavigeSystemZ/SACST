$schema: "http://json-schema.org/draft-07/schema#"
title: "Action Log Entry"
type: object
required:
  - schema_version
  - ts
  - session_id
  - actor
  - mode
  - action_class
  - status
properties:
  schema_version:
    type: integer
    const: 1
  ts:
    type: string
  session_id:
    type: string
  actor:
    type: string
  mode:
    type: string
    enum: [advisor, operator, yolo]
  action_class:
    type: string
  command_summary:
    type: string
  targets:
    type: array
    items:
      type: string
  before_refs:
    type: array
    items:
      type: string
  after_refs:
    type: array
    items:
      type: string
  rollback_refs:
    type: array
    items:
      type: string
  status:
    type: string
    enum: [planned, ok, failed, rolled_back]
  message:
    type: string
