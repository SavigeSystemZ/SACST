$schema: "http://json-schema.org/draft-07/schema#"
title: "Checkpoint Manifest"
type: object
required:
  - schema_version
  - checkpoint_id
  - created_at_utc
  - targets
properties:
  schema_version:
    type: integer
    const: 1
  checkpoint_id:
    type: string
  created_at_utc:
    type: string
  action_class:
    type: string
  targets:
    type: array
    items:
      type: object
      required: [source, backup]
      properties:
        source:
          type: string
        backup:
          type: string
