$schema: "http://json-schema.org/draft-07/schema#"
title: "Credential References"
type: object
required:
  - schema_version
  - secret_storage_policy
  - references
properties:
  schema_version:
    type: integer
    const: 1
  secret_storage_policy:
    type: string
    enum: [references-only-no-raw-secrets]
  references:
    type: array
    items:
      type: object
      required:
        - name
        - purpose
        - ref
      properties:
        name:
          type: string
        purpose:
          type: string
        ref:
          type: string
        scope:
          type: string
        rotation_note:
          type: string
