$schema: "http://json-schema.org/draft-07/schema#"
title: "Vendor Profile Catalog"
type: object
required:
  - schema_version
  - profiles
properties:
  schema_version:
    type: integer
    const: 1
  profiles:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - profile_key
        - vendor
        - families
        - device_classes
        - access_methods
        - safe_inspect_commands
        - backup_commands
        - validation_commands
        - rollback_notes
        - critical_operations
        - default_credential_policy
        - research_required_for
      properties:
        profile_key:
          type: string
        vendor:
          type: string
        families:
          type: array
          items:
            type: string
        device_classes:
          type: array
          items:
            type: string
        access_methods:
          type: array
          items:
            type: string
        safe_inspect_commands:
          type: array
          items:
            type: string
        backup_commands:
          type: array
          items:
            type: string
        validation_commands:
          type: array
          items:
            type: string
        rollback_notes:
          type: array
          items:
            type: string
        critical_operations:
          type: array
          items:
            type: string
        default_credential_policy:
          type: string
        research_required_for:
          type: array
          items:
            type: string
