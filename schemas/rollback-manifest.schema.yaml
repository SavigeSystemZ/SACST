$schema: "http://json-schema.org/draft-07/schema#"
title: "Rollback Manifest"
type: object
required:
  - schema_version
  - rollback_id
  - created_at_utc
  - checkpoint_ref
properties:
  schema_version:
    type: integer
    const: 1
  rollback_id:
    type: string
  created_at_utc:
    type: string
  checkpoint_ref:
    type: string
  instructions:
    type: array
    items:
      type: string
