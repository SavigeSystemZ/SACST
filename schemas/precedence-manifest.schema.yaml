$schema: "http://json-schema.org/draft-07/schema#"
title: "Precedence Manifest"
type: object
required:
  - schema_version
  - layers
properties:
  schema_version:
    type: integer
    const: 1
  layers:
    type: array
    items:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
