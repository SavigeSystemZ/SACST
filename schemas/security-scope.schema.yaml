$schema: "http://json-schema.org/draft-07/schema#"
title: "Security Scope"
type: object
required:
  - schema_version
  - authorized_security_testing
  - default_posture
  - allowed_activities
  - prohibited_activities
properties:
  schema_version:
    type: integer
    const: 1
  authorized_security_testing:
    type: boolean
  default_posture:
    type: string
    enum: [defensive-only, authorized-assessment, authorized-pentest]
  allowed_activities:
    type: array
    items:
      type: string
  prohibited_activities:
    type: array
    items:
      type: string
  rules_of_engagement_ref:
    type: string
  approval_ref:
    type: string
  evidence_handling:
    type: string
  notes:
    type: string
