$schema: "http://json-schema.org/draft-07/schema#"
title: "Security Scope"
type: object
required:
  - schema_version
  - authorized_security_testing
  - default_posture
  - allowed_activities
  - prohibited_activities
properties:
  schema_version:
    type: integer
    const: 1
  authorized_security_testing:
    type: boolean
  authorization_model:
    type: string
    enum: [operator-gated-current-task, explicit-roe, defensive-only]
  operator_authorization_required:
    type: boolean
  default_posture:
    type: string
    enum: [defensive-only, authorized-assessment, authorized-pentest, operator-gated-full-spectrum]
  team_modes:
    type: array
    items:
      type: string
      enum: [red_team, blue_team, purple_team]
  allowed_activities:
    type: array
    items:
      type: string
  prohibited_activities:
    type: array
    items:
      type: string
  rules_of_engagement_ref:
    type: string
  approval_ref:
    type: string
  evidence_handling:
    type: string
  notes:
    type: string
