$schema: "http://json-schema.org/draft-07/schema#"
title: "Repo Operating Profile"
type: object
required:
  - schema_version
  - instance_id
  - primary_platform
  - template_version
properties:
  schema_version:
    type: integer
    const: 1
  instance_id:
    type: string
  project_root:
    type: string
  primary_platform:
    type: string
  template_version:
    type: string
