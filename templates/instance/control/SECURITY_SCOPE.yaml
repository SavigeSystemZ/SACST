schema_version: 1
authorized_security_testing: true
authorization_model: operator-gated-current-task
operator_authorization_required: true
default_posture: operator-gated-full-spectrum
team_modes:
  - red_team
  - blue_team
  - purple_team
allowed_activities:
  - inventory
  - exposure_review
  - configuration_review
  - patch_verification
  - hardening
  - security_review
  - read_only_assessment
  - vulnerability_validation
  - exploit_validation
  - password_auditing
  - credential_audit
  - wireless_testing
  - web_application_testing
  - lateral_movement_simulation
  - controlled_load_testing
  - red_team_assessment
  - blue_team_defense
  - purple_team_validation
  - detection_engineering
  - threat_hunting
  - incident_response
prohibited_activities:
  - unauthorized_third_party_targets
  - action_outside_operator_tasking
  - uncontrolled_denial_of_service
  - destructive_testing_without_explicit_confirmation
