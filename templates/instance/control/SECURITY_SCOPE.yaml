rules_of_engagement_ref: operator-current-task
approval_ref: operator-current-task
evidence_handling: redact-sensitive-data
notes: "Default project posture is full-spectrum red/blue/purple security operations gated by the operator's current authorized tasking. Narrow this file per project or engagement when needed."
